    <title>Octagon Expansion Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              octagon: {
                pink: '#ed6a7b',
                navy: '#291756',
                purple: '#8d4f7d',
                blue: '#b1dde4',
                yellow: '#ffee7a',
                cobalt: '#4F5CD6',
                green: '#245859',
                cream: '#eed3ad',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
      }
      /* Custom slider styling for Octagon Pink */
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #ed6a7b;
        cursor: pointer;
        margin-top: -8px; 
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: #e2e8f0;
        border-radius: 2px;
      }
    </style>
